## General Information

description: >
    This dataset represents the operation of [equipment] using
    [FUEL] as a fuel source.
    Emissions and fuel-consumption data are calculated using EPA's Motor Vehicle Emission Simulator (MOVES),
    the regulatory model used to determine emission inventories for equipment used in construction, agriculture, industrial, and commercial sectors.
    The reference flows are: 1. the operation of equipment consuming 1 MJ of fuel; and 2. the operation of equipment for 1 hour.

# valid_until: 2023 # Assigned in code
# valid_from: 2023 # Assigned in code

time_description: >
    This process reflects the equipment as estimated in [YEAR].

geography_description: >
    This process represents emissions from equipment operated in the following
    U.S. states: [STATES].
geography_description_US: >
    This process represents emissions from equipment operated in all U.S. states.

technology_description: >
    This process reflects the [FUEL]-powered [equipment] used in the [sector] sector, with an average horsepower of [avg_hp] hp and a load factor of [LOAD_FACTOR].

inventory_method_description: >
    Not applicable.

modeling_constants_description: >
    Not applicable.

## Data Source information

completeness_description: >
    The results include emissions from running exhaust, crankcase venting, refueling vapor and spillage,
    evaporative tank permeation, evaporative hose permeation, and fuel vapor venting from diurnal, hot soak, and running activity.
    Evaporative emissions while the equipment is soaking (engine off) are not included.
    Manufacturing of equipment, roads, and other infrastructure are not included in
    this dataset.
    The model for nonroad equipment does not include nitrous oxide (N2O).

data_selection_description: >
    MOVES runs were performed at the default settings at the state level.

data_treatment_description: >
    Emissions are calculated using an adjusted emission factor multiplied by rated power, load factor, engine population, and activity.
    The model uses base-year equipment populations by technology type and model year, and applies growth factors to estimate the population in the analysis year.
    Nonroad emissions by equipment type, fuel type, and age are estimated based on median life at full load, load factors, activity, and age distributions.
    Equipment populations are allocated to the county level using surrogate data.

sampling_description: >
    Emissions and activity data for each state are combined to generate an activity-weighted
    average for each region. No uncertainty was assessed.

data_collection_description: >
    MOVES runs were performed using MOVES4.0.1 in 2025.

use_advice: >
    This process has two reference units: MJ of energy consumed by the equipment and 1 hour of equipment use.

sources:
 - usepa_motor_2024: USEPA (2024) MOVES4

## Admin information

project_description: >
    This dataset was developed by the Federal LCA Commons Data Curator Eastern
    Research Group, Inc. (ERG) under subcontract (SUB-2024-10066) to the National
    Renewable Energy Laboratory under Department of Energy (DOE) Prime Contract
    No. DE-AC36-08GO28308. The work is funded by DOE's Advanced Materials &
    Manufacturing Technologies Office (AMMTO).


intended_application: >
    The target audience of this model includes LCA practitioners, industry, and the general public. 
    A full inventory of environmental flows are included; 
    thus this unit process can be used for a full range of LCIA impact categories.

